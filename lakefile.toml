name = "grammars"
defaultTargets = ["Grammars"]
testDriver = "GrammarsTest"

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.28.0"

[[lean_lib]]
name = "Grammars"
srcDir = "src"

[[lean_lib]]
name = "GrammarsTest"
srcDir = "test"
roots = ["Grammars.Test"]
