name: Documentation

# Builds the prose documentation (docs/, Jekyll) and the API reference
# (doc-gen4, under /api/) and deploys both to GitHub Pages.
#
# One-time setup: in the repository settings, set Pages → Build and deployment →
# Source = "GitHub Actions".

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      build_api:
        description: "Also build the Lean/doc-gen4 API reference (SLOW — builds docs for all of Mathlib, ~30-60 min)"
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel in-progress runs.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Lean / API reference (doc-gen4) -------------------------------------
      # Opt-in only: doc-gen4 builds HTML docs for ALL of Mathlib (~30-60 min),
      # so these steps run only on a manual dispatch with `build_api = true`.
      # Non-blocking: if the heavy API build fails, the prose site still ships.
      - name: Install elan (Lean toolchain manager)
        if: ${{ inputs.build_api }}
        continue-on-error: true
        run: |
          curl -sSfL https://elan.lean-lang.org/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Resolve doc-gen4 and fetch Mathlib cache
        if: ${{ inputs.build_api }}
        continue-on-error: true
        run: |
          lake -Kdoc=on update doc-gen4
          lake exe cache get || true

      - name: Build library
        if: ${{ inputs.build_api }}
        continue-on-error: true
        run: lake build

      - name: Build API documentation (doc-gen4)
        id: apidocs
        if: ${{ inputs.build_api }}
        continue-on-error: true
        run: lake -Kdoc=on build Langlib:docs

      # --- Prose site (Jekyll + just-the-docs) ---------------------------------
      # Built with our own Gemfile (not actions/jekyll-build-pages, which only
      # supports the GitHub-Pages theme whitelist — just-the-docs is a gem theme).
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ./docs

      - name: Build prose site
        working-directory: ./docs
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --destination "$GITHUB_WORKSPACE/_site"

      - name: Attach API reference under /api
        run: |
          if [ -d .lake/build/doc ]; then
            mkdir -p _site/api
            cp -r .lake/build/doc/. _site/api/
          else
            echo "::warning::doc-gen4 output not found; deploying prose site without /api."
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
