name: Documentation

# Builds the prose documentation (docs/, Jekyll) and deploys it to GitHub Pages,
# attaching the most recently built API reference (doc-gen4, under /api).
#
# The API reference is expensive to build (doc-gen4 builds HTML for all of Mathlib,
# ~30-60 min), so it is NOT built here. The separate `api-docs.yml` workflow builds it
# on a schedule / on demand and stores it as a tarball on the `api-docs` release; this
# workflow just downloads the latest stored copy. Every push therefore deploys quickly
# and still ships the latest available /api.
#
# One-time setup: in the repository settings, set Pages -> Build and deployment ->
# Source = "GitHub Actions".

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, don't cancel in-progress runs.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Prose site (Jekyll + just-the-docs) ---------------------------------
      # Built with our own Gemfile (not actions/jekyll-build-pages, which only
      # supports the GitHub-Pages theme whitelist — just-the-docs is a gem theme).
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ./docs

      # --- API reference (fetched, not built) ----------------------------------
      # Pull the latest doc-gen4 output stored by api-docs.yml on the `api-docs` release
      # into a temp dir. Fetched BEFORE link rendering so the linker can verify anchors
      # against it; attached under /api further below. Non-blocking: if none exists yet,
      # the prose site still ships (without /api, links fall back to GitHub source).
      - name: Fetch latest API reference
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release download api-docs --repo "$GITHUB_REPOSITORY" \
               --pattern api-docs.tar.gz --dir "$RUNNER_TEMP" 2>/dev/null; then
            mkdir -p "$RUNNER_TEMP/api"
            tar -xzf "$RUNNER_TEMP/api-docs.tar.gz" -C "$RUNNER_TEMP/api"
            # Fold the doc-gen4 navbar so our Langlib module sits on top and the
            # ~12 dependency trees (Mathlib, Lean core, …) collapse into a spoiler.
            python3 scripts/spoiler_api_nav.py "$RUNNER_TEMP/api"
            echo "Fetched API reference from the api-docs release."
          else
            echo "::warning::No stored API docs (api-docs release) found; deploying without /api."
          fi

      # Resolve every `theorem` mention in the docs to its API-reference page, rendering a
      # linked copy under docs/_linked (gitignored). Mentions the API tree does not carry
      # (private, or an outdated tree missing a new module) fall back to commit-pinned
      # GitHub source. Fails the build if a page references a source file instead of a theorem.
      - name: Render theorem links
        run: |
          args=""
          [ -d "$RUNNER_TEMP/api" ] && args="--api-dir $RUNNER_TEMP/api"
          python3 scripts/link_theorems.py --out docs/_linked $args

      - name: Build prose site
        working-directory: ./docs
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --source _linked --destination "$GITHUB_WORKSPACE/_site"

      - name: Attach API reference under /api
        run: |
          if [ -d "$RUNNER_TEMP/api" ]; then
            mkdir -p _site/api
            cp -a "$RUNNER_TEMP/api/." _site/api/
            echo "Attached API reference under /api."
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
