name: API reference (doc-gen4)

# Builds the Lean/doc-gen4 API reference (HTML for the whole library and all of Mathlib)
# and stores it as a tarball asset on the `api-docs` prerelease. The Documentation
# workflow (docs.yml) downloads that asset on every deploy. Runs on every push to main;
# a build-output cache (see "Cache doc-gen4 build") keeps incremental runs fast by reusing
# Mathlib's HTML and rebuilding only changed Langlib modules.
#
# After a successful build it triggers docs.yml so the website picks up the fresh /api
# immediately; otherwise the next push to main does.

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write # create/update the api-docs release
  actions: write # trigger docs.yml

# One build at a time. An in-progress build always runs to completion; pushes that
# arrive meanwhile queue as pending, and GitHub keeps only the newest pending run —
# a newer push supersedes (cancels) the previously-waiting one. So only *waiting*
# builds are cancelled, never the one already running.
concurrency:
  group: "api-docs"
  cancel-in-progress: false

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://elan.lean-lang.org/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      # Persist the doc-gen4 build across runs so the bulk of the work (HTML for all of
      # Mathlib) is reused. doc-gen4 and Mathlib are pinned to the toolchain version
      # (lakefile.lean), so the doc-gen4 binary is reproducible and Mathlib's .oleans are
      # identical (restored by `cache get`) — Lake's per-module doc traces then match and
      # only changed Langlib modules rebuild. We cache:
      #   * .lake/build                      — doc HTML, doc-data, and Langlib's .oleans
      #   * .lake/packages/doc-gen4/.lake/build — the doc-gen4 binary, kept byte-identical
      #     so its hash (a trace input on EVERY page) stays stable across runs.
      # Mathlib's own .oleans are NOT cached here — `lake exe cache get` already fetches
      # them from Mathlib's CDN. The per-commit key suffix means every run saves a fresh
      # cache; restore-keys fall back to the latest compatible one (same toolchain always).
      - name: Cache doc-gen4 build
        uses: actions/cache@v4
        with:
          path: |
            .lake/build
            .lake/packages/doc-gen4/.lake/build
          key: docgen4-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean', 'lake-manifest.json') }}-${{ github.sha }}
          restore-keys: |
            docgen4-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lakefile.lean', 'lake-manifest.json') }}-
            docgen4-${{ runner.os }}-${{ hashFiles('lean-toolchain') }}-

      - name: Resolve doc-gen4 and fetch Mathlib cache
        run: |
          lake -Kdoc=on update doc-gen4
          lake exe cache get || true

      - name: Build library
        run: lake build

      - name: Build API documentation (doc-gen4)
        run: lake -Kdoc=on build Langlib:docs

      - name: Package API docs
        run: |
          if [ ! -d .lake/build/doc ]; then
            echo "::error::doc-gen4 produced no output (.lake/build/doc missing)."
            exit 1
          fi
          tar -czf api-docs.tar.gz -C .lake/build/doc .

      - name: Publish to the api-docs release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view api-docs --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create api-docs --repo "$GITHUB_REPOSITORY" --prerelease \
              --title "API reference (latest build)" \
              --notes "doc-gen4 output, regenerated by the API reference workflow and consumed by the docs deploy. Not a project release."
          gh release upload api-docs api-docs.tar.gz --repo "$GITHUB_REPOSITORY" --clobber

      - name: Redeploy the website with the fresh API docs
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run docs.yml --repo "$GITHUB_REPOSITORY" --ref main || true
