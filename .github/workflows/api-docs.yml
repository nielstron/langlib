name: API reference (doc-gen4)

# Builds the Lean/doc-gen4 API reference (HTML for the whole library and all of
# Mathlib, ~30-60 min) and stores it as a tarball asset on the `api-docs` prerelease.
# The Documentation workflow (docs.yml) downloads that asset on every deploy, so the
# slow build runs only here — on a schedule and on demand — never on a normal push.
#
# After a successful build it triggers docs.yml so the website picks up the fresh /api
# immediately; otherwise the next push to main does.

on:
  schedule:
    - cron: "0 4 * * 0" # weekly, Sunday 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write # create/update the api-docs release
  actions: write # trigger docs.yml

concurrency:
  group: "api-docs"
  cancel-in-progress: false

jobs:
  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan (Lean toolchain manager)
        run: |
          curl -sSfL https://elan.lean-lang.org/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Resolve doc-gen4 and fetch Mathlib cache
        run: |
          lake -Kdoc=on update doc-gen4
          lake exe cache get || true

      - name: Build library
        run: lake build

      - name: Build API documentation (doc-gen4)
        run: lake -Kdoc=on build Langlib:docs

      - name: Package API docs
        run: |
          if [ ! -d .lake/build/doc ]; then
            echo "::error::doc-gen4 produced no output (.lake/build/doc missing)."
            exit 1
          fi
          tar -czf api-docs.tar.gz -C .lake/build/doc .

      - name: Publish to the api-docs release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view api-docs --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || \
            gh release create api-docs --repo "$GITHUB_REPOSITORY" --prerelease \
              --title "API reference (latest build)" \
              --notes "doc-gen4 output, regenerated by the API reference workflow and consumed by the docs deploy. Not a project release."
          gh release upload api-docs api-docs.tar.gz --repo "$GITHUB_REPOSITORY" --clobber

      - name: Redeploy the website with the fresh API docs
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run docs.yml --repo "$GITHUB_REPOSITORY" --ref main || true
